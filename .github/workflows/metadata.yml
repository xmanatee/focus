name: Push App Store Metadata

on:
  workflow_dispatch:

concurrency:
  group: app-store-metadata
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      EXPO_APPLE_TEAM_TYPE: COMPANY_OR_ORGANIZATION
      APPLE_REVIEW_FIRST_NAME: ${{ secrets.APPLE_REVIEW_FIRST_NAME }}
      APPLE_REVIEW_LAST_NAME: ${{ secrets.APPLE_REVIEW_LAST_NAME }}
      APPLE_REVIEW_EMAIL: ${{ secrets.APPLE_REVIEW_EMAIL }}
      APPLE_REVIEW_PHONE: ${{ secrets.APPLE_REVIEW_PHONE }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate metadata
        run: npm exec --yes --package eas-cli -- eas metadata:lint

      - name: Push metadata to App Store Connect
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm exec --yes --package eas-cli -- eas metadata:push --non-interactive
