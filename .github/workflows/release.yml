name: Release iOS

# Required GitHub Actions secrets:
#   EXPO_TOKEN              — Expo robot-user token, project-scoped
#   APPLE_TEAM_ID           — 10-char Apple Developer Team ID
#   APPLE_REVIEW_FIRST_NAME — App Review contact, given name
#   APPLE_REVIEW_LAST_NAME  — App Review contact, family name
#   APPLE_REVIEW_EMAIL      — App Review contact email
#   APPLE_REVIEW_PHONE      — App Review contact phone (E.164, e.g. +447…)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      submit:
        description: "Submit to TestFlight after build"
        type: boolean
        default: true
      push_metadata:
        description: "Sync ASC listing from store.config.js"
        type: boolean
        default: true

concurrency:
  group: release-ios
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      EXPO_APPLE_TEAM_TYPE: INDIVIDUAL
      APPLE_REVIEW_FIRST_NAME: ${{ secrets.APPLE_REVIEW_FIRST_NAME }}
      APPLE_REVIEW_LAST_NAME: ${{ secrets.APPLE_REVIEW_LAST_NAME }}
      APPLE_REVIEW_EMAIL: ${{ secrets.APPLE_REVIEW_EMAIL }}
      APPLE_REVIEW_PHONE: ${{ secrets.APPLE_REVIEW_PHONE }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate metadata
        run: npm exec --yes --package eas-cli -- eas metadata:lint

      - name: Push metadata to App Store Connect
        if: ${{ github.event.inputs.push_metadata != 'false' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: node scripts/run-eas-metadata-push.mjs

      - name: Build iOS production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm exec --yes --package eas-cli -- eas build --platform ios --profile production --non-interactive --wait

      - name: Submit to TestFlight
        if: ${{ github.event.inputs.submit != 'false' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm exec --yes --package eas-cli -- eas submit --platform ios --latest --non-interactive --wait
